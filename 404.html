<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | Донбасс Карго</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Caveat:wght@700&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #050608;
      --bg-card: #0D1520;
      --accent: #2BA7C9;
      --accent-hover: #3BB4D6;
      --text-primary: #F5F1EA;
      --text-secondary: rgba(245, 241, 234, 0.6);
      --text-muted: rgba(245, 241, 234, 0.35);
      --pill-radius: 9999px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10000;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(43, 167, 201, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(90, 50, 120, 0.04) 0%, transparent 50%);
      filter: blur(80px);
    }

    .error-container {
      text-align: center;
      padding: 40px 24px;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .error-code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, rgba(43, 167, 201, 0.3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .error-title {
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .error-desc {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 36px;
      font-weight: 300;
    }

    .error-truck {
      margin-bottom: 32px;
    }

    .error-truck svg {
      width: clamp(80px, 15vw, 120px);
      height: auto;
      opacity: 0.4;
      animation: truckDrive 3s ease-in-out infinite;
    }

    @keyframes truckDrive {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: var(--pill-radius);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    .error-btn-primary {
      background: var(--accent);
      color: var(--bg-deep);
      border: 1px solid var(--accent);
    }

    .error-btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(43, 167, 201, 0.3);
    }

    .error-btn-secondary {
      background: rgba(43, 167, 201, 0.05);
      color: var(--accent);
      border: 1px solid rgba(43, 167, 201, 0.3);
    }

    .error-btn-secondary:hover {
      background: rgba(43, 167, 201, 0.12);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .error-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .error-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .error-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .error-actions {
        flex-direction: column;
      }

      .error-btn {
        justify-content: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-truck">
      <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="15" width="60" height="30" rx="3" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
        <path d="M65 25h20a5 5 0 0 1 5 5v15H65V25z" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
        <line x1="75" y1="25" x2="82" y2="25" stroke="#2BA7C9" stroke-width="1"/>
        <circle cx="25" cy="48" r="6" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
        <circle cx="25" cy="48" r="2" fill="#2BA7C9" opacity="0.3"/>
        <circle cx="80" cy="48" r="6" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
        <circle cx="80" cy="48" r="2" fill="#2BA7C9" opacity="0.3"/>
        <text x="20" y="36" font-family="Inter, sans-serif" font-size="8" fill="#2BA7C9" opacity="0.5">?</text>
      </svg>
    </div>

    <div class="error-code">404</div>
    <h1 class="error-title">Страница не найдена</h1>
    <p class="error-desc">Груз потерялся в пути. Возможно, страница была перемещена или удалена.</p>

    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        На главную
      </a>
      <a href="javascript:history.back()" class="error-btn error-btn-secondary">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Назад
      </a>
    </div>

    <div class="error-footer">
      <a href="/">Донбасс Карго</a> — надёжные транспортные решения для бизнеса
    </div>
  </div>

</body>
</html>
