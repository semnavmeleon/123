<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | Донбасс Карго</title>
  <meta name="description" content="Страница не найдена. Донбасс Карго — грузоперевозки и логистика по России и СНГ.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#050608">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Caveat:wght@700&display=swap">
  <link rel="stylesheet" href="css/all.min.css">
  <style>
    /* Только страница 404 — общий фон и свечение из all.min.css */
    body.page-404 {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: stretch;
    }

    .page-404-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 48px;
      width: 100%;
    }

    .error-container {
      text-align: center;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .error-truck {
      margin-bottom: 28px;
    }

    .error-truck svg {
      width: clamp(80px, 15vw, 120px);
      height: auto;
      opacity: 0.45;
      animation: errorTruckDrive 3s ease-in-out infinite;
    }

    @keyframes errorTruckDrive {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    .error-code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, rgba(43, 167, 201, 0.3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .error-title {
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .error-desc {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: var(--pill-radius);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      letter-spacing: 0.3px;
      border: none;
      font: inherit;
    }

    .error-btn-primary {
      background: var(--accent);
      color: var(--bg-deep);
      border: 1px solid var(--accent);
    }

    .error-btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(43, 167, 201, 0.3);
    }

    .error-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-footer {
      margin-top: 40px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .error-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .error-footer a:hover {
      text-decoration: underline;
    }

    .error-footer-sep {
      display: inline-block;
      margin: 0 8px;
      opacity: 0.5;
    }

    .error-footer-tagline {
      display: inline-block;
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      .error-actions {
        flex-direction: column;
      }

      .error-btn {
        width: 100%;
      }

      .page-404-wrap {
        padding-top: 88px;
      }
    }
  </style>
</head>
<body class="page-404">

  <a class="logo" href="index.html" aria-label="Донбасс Карго — на главную">
    <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="boxGrad404" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#D4A24C"/>
          <stop offset="100%" style="stop-color:#B8862E"/>
        </linearGradient>
      </defs>
      <polygon points="32,8 54,20 54,44 32,56 10,44 10,20" fill="none" stroke="url(#boxGrad404)" stroke-width="2" stroke-linejoin="round"/>
      <line x1="32" y1="32" x2="32" y2="56" stroke="url(#boxGrad404)" stroke-width="1.5"/>
      <line x1="32" y1="32" x2="10" y2="20" stroke="url(#boxGrad404)" stroke-width="1.5"/>
      <line x1="32" y1="32" x2="54" y2="20" stroke="url(#boxGrad404)" stroke-width="1.5"/>
      <polygon points="32,8 54,20 32,32 10,20" fill="rgba(212,162,76,0.15)"/>
      <polygon points="10,20 32,32 32,56 10,44" fill="rgba(184,134,46,0.12)"/>
      <polygon points="32,32 54,20 54,44 32,56" fill="rgba(212,162,76,0.08)"/>
    </svg>
    <div class="logo-text">ДОНБАСС КАРГО</div>
  </a>

  <div class="page-404-wrap">
    <div class="error-container" role="main" aria-labelledby="error-heading">
      <div class="error-truck" aria-hidden="true">
        <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="15" width="60" height="30" rx="3" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
          <path d="M65 25h20a5 5 0 0 1 5 5v15H65V25z" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
          <line x1="75" y1="25" x2="82" y2="25" stroke="#2BA7C9" stroke-width="1"/>
          <circle cx="25" cy="48" r="6" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
          <circle cx="25" cy="48" r="2" fill="#2BA7C9" opacity="0.3"/>
          <circle cx="80" cy="48" r="6" fill="none" stroke="#2BA7C9" stroke-width="1.5"/>
          <circle cx="80" cy="48" r="2" fill="#2BA7C9" opacity="0.3"/>
          <text x="20" y="36" font-family="Inter, sans-serif" font-size="8" fill="#2BA7C9" opacity="0.5">?</text>
        </svg>
      </div>

      <p class="error-code" aria-hidden="true">404</p>
      <h1 class="error-title" id="error-heading">Страница не найдена</h1>
      <p class="error-desc">Похоже, этот адрес изменился или страницы никогда не было. Проверьте ссылку или вернитесь на главную.</p>

      <div class="error-actions">
        <a href="index.html" class="error-btn error-btn-primary">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          На главную
        </a>
      </div>

      <div class="error-footer">
        <a href="index.html">Донбасс Карго</a><span class="error-footer-sep">·</span><a href="privacy.html">Политика конфиденциальности</a>
        <br>
        <span class="error-footer-tagline">Надёжные транспортные решения для бизнеса</span>
      </div>
    </div>
  </div>

</body>
</html>
